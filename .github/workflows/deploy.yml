name: Minecraft Stack CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  terraform:
    name: OpenTofu Infrastructure
    runs-on: ubuntu-latest
    environment: mc-prod
    defaults:
      run:
        working-directory: ./infra
    env:
      TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
      TF_VAR_ts_oauth_client_id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
      TF_VAR_ts_oauth_client_secret: ${{ secrets.TS_OAUTH_CLIENT_SECRET }}
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}

      TF_VAR_ts_tailnet: ${{ vars.TS_TAILNET }}
      TF_VAR_username: ${{ vars.USERNAME }}

      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: OpenTofu Init & Apply
        run: |
          tofu init \
            -backend-config="bucket=${{ secrets.R2_BUCKET_NAME }}" \
            -backend-config="endpoint=${{ secrets.R2_ENDPOINT }}"
          tofu apply -auto-approve

  # -- Application (Docker Compose) ---
  deploy:
    name: Deploy Application
    # needs: infra # TODO: add opentofu infra job
    runs-on: ubuntu-latest
    environment: mc-prod
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Authenticate with Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        with:
          host: ${{ vars.TS_HOST }}
          username: ${{ vars.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: SOPS_AGE_KEY
          script: |
            set -e

            APP_DIR="$HOME/app"
            REPO="https://github.com/Qwacktuz/minecraft-smp.git"
            BRANCH="main"
            SERVICE="fabric-server"

            echo "Starting deployment..."

            mkdir -p "$APP_DIR" # done in terraform
            cd "$APP_DIR"

            # clone repo if it doesn't exist
            if [ ! -d ".git" ]; then
              echo "Cloning repository..."
              git clone "$REPO" .
            fi

            echo "Updating repository..."
            git fetch origin "$BRANCH"
            git reset --hard "origin/$BRANCH"

            echo "Generating runtime environment..."
            echo "$SOPS_AGE_KEY" > age.key
            chmod 600 age.key
            export SOPS_AGE_KEY_FILE=$(pwd)/age.key

            /usr/local/bin/sops --decrypt --output-type dotenv secrets/secrets.enc.env > .env

            # Check if the file is empty
            if [ ! -s .env ]; then
              echo "ERROR: .env file is empty after decryption!"
              exit 1
            fi

            rm age.key

            echo "Add runtime variables..."
            cat <<EOF >> .env
            TS_IP=$(tailscale ip -4)
            EOF

            chmod 600 .env

            echo "--- Environment Check ---"
            # This confirms the file exists and has content without leaking secrets
            if [ -f .env ]; then
                echo ".env file created successfully ($(wc -l < .env) lines)"
            else
                echo "ERROR: .env file was not created!"
                exit 1
            fi


            if docker compose ps --services --filter "status=running" | grep -q "fabric-server"; then
              echo "Notifying players..."
              docker compose exec -T fabric-server rcon-cli "say §cSystem update initiated..."
              docker compose exec -T fabric-server rcon-cli "save-all"
              sleep 5
            fi

            echo "Pulling container images..."
            docker compose pull
            echo "Updating containers... "
            docker compose up -d --remove-orphans
            echo "Cleaning up unused images... "
            docker system prune -f

            # post deploy notification
            sleep 10
            if docker compose ps --services --filter "status=running" | grep -q "$SERVICE"; then
              docker compose exec -T "$SERVICE" rcon-cli "title @a clear" || true
              docker compose exec -T "$SERVICE" rcon-cli "playsound entity.player.levelup master @a" || true
              docker compose exec -T "$SERVICE" rcon-cli "say §aDeployment complete! Server is stable." || true
              docker compose exec -T "$SERVICE" rcon-cli \
                "title @a actionbar {\"text\":\"§aSystem Update Complete\", \"bold\":true}" || true
            fi

            echo "Deployment finished successfully."
